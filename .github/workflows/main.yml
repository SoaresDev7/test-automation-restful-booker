name: Cypress Regression Tests

on: [push, pull_request]

permissions:
  contents: read
  pull-requests: write

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cypress run
        uses: cypress-io/github-action@v6
        continue-on-error: true
        with:
          browser: chrome
          spec: cypress/e2e/**/*
          record: true
        env:
          CYPRESS_BASE_URL: https://restful-booker.herokuapp.com
          CYPRESS_platformUrl: https://automationintesting.online
          CYPRESS_RECORD_KEY: ${{secrets.CYPRESS_RECORD_KEY}}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Relatorio-Mochawesome
          path: cypress/reports

      - name: Upload Report to AWS S3
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 sync cypress/reports s3://relatorios-cypress-soaresdev7/runs/${{ github.run_id }} \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --include "assets/**"

      - name: Print Report URL
        if: always()
        run: |
          echo "=== Relatórios disponíveis ==="
          echo "API:  http://relatorios-cypress-soaresdev7.s3-website-us-east-1.amazonaws.com/runs/${{ github.run_id }}/mochawesome.html"
          echo "UI:   http://relatorios-cypress-soaresdev7.s3-website-us-east-1.amazonaws.com/runs/${{ github.run_id }}/mochawesome_001.html"